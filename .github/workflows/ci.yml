name: CI Fix

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      # FORCE NODE 20
      - name: Use Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # DEBUG (IMPORTANT)
      - name: Check Node Version
        run: node -v

      # FRONTEND
      - name: Build Frontend
        run: |
          cd frontend
          npm install
          npm run build

      # BACKEND
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Backend Check
        run: |
          cd backend
          pip install -r requirements.txt
          python -m py_compile $(git ls-files '*.py')