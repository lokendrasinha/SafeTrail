name: CI Fix

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      # NODE SETUP
      - name: Use Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"

      - name: Check Node Version
        run: node -v

      # FRONTEND
      - name: Build Frontend
        working-directory: frontend
        run: |
          npm install
          npm run build

      # PYTHON SETUP
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      # BACKEND
      - name: Backend Check
        working-directory: backend
        run: |
          pip install -r requirements.txt
          python -m compileall .