name: Simple CI

on:
  push:
    branches: ["main"]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Get code
        uses: actions/checkout@v3

      # FRONTEND CHECK
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install frontend
        run: |
          cd frontend
          npm install

      - name: Build frontend
        run: |
          cd frontend
          npm run build

      # BACKEND CHECK
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.10

      - name: Install backend
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Check backend
        run: |
          cd backend
          python -m py_compile $(git ls-files '*.py')