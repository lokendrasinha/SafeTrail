name: Simple CI

on:
  push:
    branches: ["main"]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      # Checkout code
      - uses: actions/checkout@v3

      # 🔥 FORCE NODE 20 (IMPORTANT)
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 🔍 VERIFY NODE VERSION (VERY IMPORTANT)
      - name: Check Node Version
        run: node -v

      # FRONTEND
      - name: Install & Build Frontend
        run: |
          cd frontend
          npm install
          npm run build

      # BACKEND
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.10

      - name: Install & Check Backend
        run: |
          cd backend
          pip install -r requirements.txt
          python -m py_compile $(git ls-files '*.py')